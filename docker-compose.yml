services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector:
    build: ./backend
    command: ["python", "-m", "app.workers.collector"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analyzer:
    build: ./backend
    command: ["python", "-m", "app.workers.analyzer"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      WHATSAPP_BRIDGE_URL: http://whatsapp:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  whatsapp:
    build: ./whatsapp
    env_file: .env
    environment:
      BAILEYS_AUTH_DIR: /data/auth
    ports:
      - "3000:3000"
    volumes:
      - whatsapp_auth:/data/auth

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  whatsapp_auth:
